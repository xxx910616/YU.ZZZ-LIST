<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YU.ZZZ 代購助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F1F5F9; color: #334155; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(148, 163, 184, 0.15); }
        .modal-animate { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="pb-20">

    <!-- Header -->
    <header class="sticky top-0 z-30 bg-slate-500/90 backdrop-blur-md border-b border-white/10 shadow-sm">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-white font-black tracking-[0.2em] text-lg uppercase">YU.ZZZ LIST</h1>
            <div id="auth-status" class="text-[10px] text-white/50 font-bold uppercase tracking-widest">Connecting...</div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
        <!-- 操作欄 -->
        <div class="flex flex-col md:flex-row gap-4 mb-10">
            <div class="relative flex-1 group">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                <input type="text" id="searchInput" placeholder="搜尋商品、客戶..." 
                    class="w-full pl-12 pr-4 py-4 rounded-2xl bg-white border-none shadow-sm focus:ring-4 focus:ring-slate-200 outline-none transition-all font-medium text-slate-600">
            </div>
            <div class="flex gap-3">
                <button id="exportBtn" class="px-6 py-4 bg-white border border-slate-200 rounded-2xl font-bold text-slate-500 hover:bg-slate-50 transition-all flex items-center gap-2">
                    <i data-lucide="download" class="w-5 h-5"></i> EXPORT
                </button>
                <button id="addBtn" class="px-10 py-4 bg-amber-200 text-amber-800 rounded-2xl font-black shadow-md border-b-4 border-amber-300 active:scale-95 transition-all flex items-center gap-2">
                    <i data-lucide="plus" class="w-5 h-5"></i> ADD
                </button>
            </div>
        </div>

        <!-- 列表容器 -->
        <div id="itemsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20 text-slate-300 font-bold tracking-widest uppercase animate-pulse">
                Fetching Records...
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-md" id="modalOverlay"></div>
        <div class="bg-white rounded-[3rem] w-full max-w-md relative z-10 overflow-hidden shadow-2xl modal-animate border border-white/50">
            <div class="p-8 text-white flex justify-between items-center bg-slate-500">
                <h2 id="modalTitle" class="text-xl font-black tracking-widest uppercase">ADD NEW</h2>
                <button id="closeModal" class="p-2 hover:bg-white/10 rounded-full transition-all">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <form id="itemForm" class="p-8 space-y-5 max-h-[70vh] overflow-y-auto custom-scrollbar">
                <input type="hidden" id="editId">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">商品名稱</label>
                    <input type="text" id="name" required class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none font-bold text-slate-600 focus:ring-4 focus:ring-slate-100 outline-none" placeholder="如：限定保養品">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">委託客戶</label>
                        <input type="text" id="customer" class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none font-bold text-slate-600" placeholder="客戶名">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">標籤</label>
                        <input type="text" id="tags" class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none font-bold text-slate-600" placeholder="藥妝, 服飾">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">圖片</label>
                    <div class="border-2 border-dashed border-slate-100 rounded-3xl py-10 text-center relative bg-slate-50 hover:bg-slate-100 transition-all cursor-pointer group">
                        <div id="imagePreview" class="hidden">
                            <img src="" id="previewImg" class="max-h-32 mx-auto rounded-xl shadow-lg">
                        </div>
                        <div id="uploadPlaceholder">
                            <i data-lucide="image" class="mx-auto w-10 h-10 text-slate-200"></i>
                            <p class="text-[10px] mt-2 font-black text-slate-300 uppercase tracking-tighter">Click to upload</p>
                        </div>
                        <input type="file" id="imageInput" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*">
                    </div>
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="submit" id="submitBtn" class="flex-1 py-5 bg-amber-200 text-amber-800 font-black rounded-3xl shadow-lg active:scale-95 border-b-4 border-amber-300 transition-all">
                        CONFIRM
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Firebase 初始化
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'proxy-shopping-app';

        let items = [];
        let base64Image = null;
        let isUserAuthenticated = false;

        // 初始化圖示
        lucide.createIcons();

        // 登入處理 (遵循 Rule 3)
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth initialization failed:", err);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                isUserAuthenticated = true;
                document.getElementById('auth-status').innerText = 'Cloud Sync Active';
                startListening();
            } else {
                isUserAuthenticated = false;
                initAuth();
            }
        });

        // 定義資料參考路徑 (遵循 Rule 1)
        const getProductsCollection = () => collection(db, 'artifacts', appId, 'public', 'data', 'products');
        const getProductDoc = (id) => doc(db, 'artifacts', appId, 'public', 'data', 'products', id);

        // 監聽數據
        function startListening() {
            if (!isUserAuthenticated) return;
            
            const itemsRef = getProductsCollection();
            
            onSnapshot(itemsRef, (snapshot) => {
                items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderItems();
            }, (err) => {
                console.error("Firestore Permission Error:", err);
                document.getElementById('auth-status').innerText = 'Sync Error - Retrying...';
            });
        }

        // 渲染列表
        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            const queryText = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = items.filter(item => 
                (item.name || "").toLowerCase().includes(queryText) || 
                (item.customer || "").toLowerCase().includes(queryText)
            );

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-slate-300 font-bold uppercase tracking-widest text-xs">No records found</div>`;
                return;
            }

            grid.innerHTML = filtered.map(item => `
                <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-xl border border-slate-100 flex flex-col group">
                    <div class="h-52 relative overflow-hidden bg-slate-50">
                        ${item.image ? `<img src="${item.image}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">` : 
                          `<div class="w-full h-full flex items-center justify-center text-slate-100"><i data-lucide="image" class="w-14 h-14"></i></div>`}
                        <div class="absolute top-5 left-5">
                            <span class="px-4 py-1.5 rounded-full text-[10px] font-black tracking-wider uppercase border ${item.status === '待購' ? 'bg-white/80 text-slate-500 border-white/50' : 'bg-slate-500 text-white border-white/20 shadow-lg'}">
                                ${item.status}
                            </span>
                        </div>
                    </div>
                    <div class="p-7 flex-1 flex flex-col ${item.status === '已採購' ? 'bg-amber-50' : ''}">
                        <h3 class="font-black text-lg mb-1 line-clamp-1 text-slate-700">${item.name}</h3>
                        <div class="flex items-center gap-2 text-xs font-bold mb-4 text-slate-400">
                            <i data-lucide="user" class="w-3.5 h-3.5 opacity-50"></i>
                            <span>${item.customer || '匿名'}</span>
                        </div>
                        <div class="flex flex-wrap gap-2 mb-6 min-h-[24px]">
                            ${(item.tags || []).map(tag => `<span class="px-3 py-1 bg-slate-100 text-slate-500 rounded-lg text-[10px] font-bold">#${tag}</span>`).join('')}
                        </div>
                        <div class="mt-auto flex items-center gap-2 pt-5 border-t border-slate-100/50">
                            <button onclick="window.editItem('${item.id}')" class="p-3 rounded-2xl hover:bg-slate-100 text-slate-300 transition-all"><i data-lucide="edit-3" class="w-4.5 h-4.5"></i></button>
                            <button onclick="window.toggleStatus('${item.id}')" class="flex-1 py-3 rounded-2xl text-[11px] font-black flex items-center justify-center gap-2 shadow-sm ${item.status === '待購' ? 'bg-slate-50 text-slate-400 border border-slate-200/50' : 'bg-amber-200 text-amber-800 border-b-2 border-amber-300'}">
                                ${item.status === '待購' ? '<i data-lucide="check-circle-2" class="w-4 h-4"></i>標記已採購' : '<i data-lucide="rotate-ccw" class="w-4 h-4"></i>回復待購'}
                            </button>
                            <button onclick="window.deleteItem('${item.id}')" class="p-3 text-slate-100 hover:text-red-300 transition-all"><i data-lucide="trash-2" class="w-4.5 h-4.5"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // 圖片壓縮邏輯
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; 
                    const scale = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    base64Image = canvas.toDataURL('image/jpeg', 0.6);
                    
                    document.getElementById('previewImg').src = base64Image;
                    document.getElementById('imagePreview').classList.remove('hidden');
                    document.getElementById('uploadPlaceholder').classList.add('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // 表單提交
        document.getElementById('itemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!isUserAuthenticated) return;

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = 'SAVING...';

            const editId = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('name').value,
                customer: document.getElementById('customer').value,
                tags: document.getElementById('tags').value.split(',').map(t => t.trim()).filter(t => t),
                image: base64Image,
                status: editId ? items.find(i => i.id === editId).status : '待購',
                updatedAt: new Date().toISOString()
            };

            try {
                if (editId) {
                    await updateDoc(getProductDoc(editId), data);
                } else {
                    await addDoc(getProductsCollection(), { ...data, createdAt: new Date().toISOString() });
                }
                closeModal();
            } catch (err) {
                console.error("Save Error:", err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'CONFIRM';
            }
        });

        // 功能導出到 window
        window.toggleStatus = async (id) => {
            if (!isUserAuthenticated) return;
            const item = items.find(i => i.id === id);
            const newStatus = item.status === '待購' ? '已採購' : '待購';
            await updateDoc(getProductDoc(id), { status: newStatus });
        };

        window.deleteItem = async (id) => {
            if (!isUserAuthenticated) return;
            if (confirm('確定要刪除嗎？')) {
                await deleteDoc(getProductDoc(id));
            }
        };

        window.editItem = (id) => {
            const item = items.find(i => i.id === id);
            document.getElementById('editId').value = item.id;
            document.getElementById('name').value = item.name;
            document.getElementById('customer').value = item.customer || '';
            document.getElementById('tags').value = (item.tags || []).join(', ');
            base64Image = item.image;
            if (base64Image) {
                document.getElementById('previewImg').src = base64Image;
                document.getElementById('imagePreview').classList.remove('hidden');
                document.getElementById('uploadPlaceholder').classList.add('hidden');
            }
            document.getElementById('modalTitle').innerText = 'EDIT PRODUCT';
            document.getElementById('modal').classList.remove('hidden');
        };

        // CSV 導出
        document.getElementById('exportBtn').addEventListener('click', () => {
            const headers = ['名稱', '客戶', '狀態'];
            const csv = "\ufeff" + [headers.join(','), ...items.map(i => [i.name, i.customer, i.status].join(','))].join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `購物清單_${new Date().toLocaleDateString()}.csv`;
            a.click();
        });

        // 搜尋監聽
        document.getElementById('searchInput').addEventListener('input', renderItems);

        // Modal 顯隱
        const openModal = () => {
            document.getElementById('editId').value = '';
            document.getElementById('itemForm').reset();
            base64Image = null;
            document.getElementById('imagePreview').classList.add('hidden');
            document.getElementById('uploadPlaceholder').classList.remove('hidden');
            document.getElementById('modalTitle').innerText = 'ADD NEW';
            document.getElementById('modal').classList.remove('hidden');
        };

        const closeModal = () => document.getElementById('modal').classList.add('hidden');

        document.getElementById('addBtn').addEventListener('click', openModal);
        document.getElementById('closeModal').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', closeModal);
    </script>
</body>
</html>
