<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YU.ZZZ LIST CLOUD SPEED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'yu-zzz-list';
        const CACHE_KEY = `cache_${appId}_items`;

        let items = [];
        let base64Img = null;
        let currentUser = null;

        // 1. 優先從本地讀取快取 (實現秒開)
        const loadCache = () => {
            const cached = localStorage.getItem(CACHE_KEY);
            if (cached) {
                try {
                    items = JSON.parse(cached);
                    render(); // 立即渲染本地數據
                } catch (e) { console.error("快取解析失敗", e); }
            }
        };

        // 顯示 Toast
        window.showToast = (msg, type = 'success') => {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            const toastIcon = document.getElementById('toastIcon');
            toastMsg.innerText = msg;
            toastIcon.className = type === 'success' ? 'w-5 h-5 text-emerald-400' : 'w-5 h-5 text-rose-400';
            toast.classList.remove('hidden');
            lucide.createIcons();
            setTimeout(() => toast.classList.add('hidden'), 2000);
        };

        // 渲染引擎
        const render = () => {
            const grid = document.getElementById('itemsGrid');
            const emptyState = document.getElementById('emptyState');
            const searchVal = document.getElementById('searchInput').value.trim().toLowerCase();
            
            let list = items.filter(i => 
                (i.name || '').toLowerCase().includes(searchVal) || 
                (i.customer || '').toLowerCase().includes(searchVal) ||
                (i.tags || []).some(t => t.toLowerCase().includes(searchVal))
            );

            list.sort((a, b) => {
                if (a.status !== b.status) return a.status === '待購' ? -1 : 1;
                return new Date(b.createdAt) - new Date(a.createdAt);
            });

            if (items.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            grid.innerHTML = list.map(i => {
                const isDone = i.status === '已採購';
                const tagHtml = (i.tags || []).map(t => `<span class="bg-slate-800 text-white px-1.5 py-0.5 rounded text-[8px] font-black ml-1 mb-1">#${t}</span>`).join('');
                
                return `
                <div id="item-${i.id}" class="bg-white rounded-[1.2rem] sm:rounded-[2.5rem] overflow-hidden shadow-sm border border-slate-100 flex flex-col relative transition-all">
                    <div class="img-container">
                        ${i.image ? `<img src="${i.image}" loading="lazy">` : `<i data-lucide="image" class="w-8 h-8 text-slate-100"></i>`}
                        ${isDone ? `<div class="absolute inset-0 purchased-overlay flex items-center justify-center"><div class="bg-white/90 border border-sky-200 px-3 py-1 rounded-full shadow-md text-[8px] sm:text-xs tracking-widest uppercase text-sky-700 font-black">DONE</div></div>` : ''}
                    </div>
                    <div class="p-3 sm:p-6 flex-1 flex flex-col">
                        <div class="mb-2">
                            <div class="font-black text-slate-700 text-sm sm:text-lg line-clamp-1 leading-tight uppercase mb-2">${i.name}</div>
                            <div class="flex justify-between items-center gap-2">
                                <div class="text-[9px] sm:text-[11px] text-slate-400 font-black uppercase truncate flex-1">${i.customer || '匿名'}</div>
                                <div class="flex flex-wrap justify-end">${tagHtml}</div>
                            </div>
                        </div>
                        <div class="mt-auto pt-3 flex flex-col sm:flex-row items-stretch gap-2 border-t border-slate-50">
                            <button onclick="window.toggleStatus('${i.id}')" class="flex-1 py-2 rounded-lg text-[8px] sm:text-[10px] font-black tracking-widest uppercase shadow-sm ${isDone ? 'bg-yellow-100 text-yellow-800' : 'bg-slate-50 text-slate-400'}">
                                ${isDone ? 'REVERT' : 'DONE'}
                            </button>
                            <div class="flex justify-center gap-2">
                                <button onclick="window.editItem('${i.id}')" class="p-2 text-slate-300"><i data-lucide="edit-3" class="w-4 h-4 sm:w-5 sm:h-5"></i></button>
                                <button onclick="window.deleteItem('${i.id}')" class="p-2 text-rose-300"><i data-lucide="trash-2" class="w-4 h-4 sm:w-5 sm:h-5"></i></button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        };

        // 初始化 Auth 與 Firestore 監聽
        const init = async () => {
            loadCache(); // 先加載本地資料

            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            
            await initAuth();

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    const q = collection(db, 'artifacts', appId, 'public', 'data', 'items');
                    onSnapshot(q, (snapshot) => {
                        const newItems = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        items = newItems;
                        // 儲存到本地快取
                        localStorage.setItem(CACHE_KEY, JSON.stringify(items));
                        render();
                        document.getElementById('loading').classList.add('hidden');
                    }, (err) => {
                        console.error("監聽失敗", err);
                        window.showToast('連線異常', 'error');
                    });
                }
            });
        };

        // 全域功能
        window.toggleStatus = async (id) => {
            if (!currentUser) return;
            const item = items.find(x => x.id === id);
            const newStatus = item.status === '已採購' ? '待購' : '已採購';
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'items', id), { status: newStatus });
        };

        window.deleteItem = async (id) => {
            if (!currentUser) return;
            if (confirm('確定要刪除嗎？')) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'items', id));
                window.showToast('已刪除');
            }
        };

        window.editItem = (id) => {
            const i = items.find(x => x.id === id);
            if (!i) return;
            document.getElementById('editId').value = i.id;
            document.getElementById('name').value = i.name;
            document.getElementById('customer').value = i.customer || '';
            document.getElementById('tags').value = (i.tags || []).join(',');
            base64Img = i.image;
            if(base64Img) {
                document.getElementById('previewImg').src = base64Img;
                document.getElementById('previewImg').classList.remove('hidden');
                document.getElementById('uploadText').classList.add('hidden');
            }
            document.getElementById('modalTitle').innerText = 'EDIT ITEM';
            document.getElementById('modal').classList.remove('hidden');
        };

        document.getElementById('itemForm').onsubmit = async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const id = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('name').value.trim(),
                customer: document.getElementById('customer').value.trim(),
                tags: document.getElementById('tags').value.split(',').map(t => t.trim()).filter(t => t),
                image: base64Img,
                updatedAt: new Date().toISOString()
            };

            try {
                if (id) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'items', id), data);
                    window.showToast('修改成功');
                } else {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'items'), {
                        ...data,
                        status: '待購',
                        createdAt: new Date().toISOString()
                    });
                    window.showToast('新增成功');
                }
                closeModal();
            } catch (err) {
                window.showToast('儲存失敗', 'error');
            }
        };

        document.getElementById('imageInput').onchange = (e) => {
            const f = e.target.files[0];
            if (!f) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const w = 400; canvas.width = w; canvas.height = w;
                    const ctx = canvas.getContext('2d');
                    const side = Math.min(img.width, img.height);
                    ctx.drawImage(img, (img.width-side)/2, (img.height-side)/2, side, side, 0, 0, w, w);
                    base64Img = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('previewImg').src = base64Img;
                    document.getElementById('previewImg').classList.remove('hidden');
                    document.getElementById('uploadText').classList.add('hidden');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(f);
        };

        const closeModal = () => {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('itemForm').reset();
            base64Img = null;
            document.getElementById('editId').value = '';
            document.getElementById('previewImg').classList.add('hidden');
            document.getElementById('uploadText').classList.remove('hidden');
        };

        document.getElementById('addBtn').onclick = () => { closeModal(); document.getElementById('modal').classList.remove('hidden'); };
        document.getElementById('closeModal').onclick = closeModal;
        document.getElementById('modalOverlay').onclick = closeModal;
        document.getElementById('searchInput').oninput = render;

        window.onload = init;
    </script>

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F1F5F9; color: #334155; -webkit-tap-highlight-color: transparent; }
        .purchased-overlay { background: rgba(224, 242, 254, 0.85); backdrop-filter: blur(2px); }
        .modal-animate { animation: slideUp 0.2s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .img-container { position: relative; width: 100%; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; background: #f8fafc; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .control-height { height: 52px; }
        .loading-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="pb-10">

    <!-- 全螢幕加載狀態 (僅在完全沒資料時顯示) -->
    <div id="loading" class="fixed inset-0 z-[60] bg-slate-900/10 backdrop-blur-sm flex items-center justify-center hidden">
        <div class="bg-white p-6 rounded-3xl shadow-xl flex flex-col items-center gap-3">
            <div class="w-10 h-10 border-4 border-slate-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Syncing Cloud...</p>
        </div>
    </div>

    <div id="toast" class="fixed left-1/2 -translate-x-1/2 bottom-10 z-[100] hidden">
        <div class="bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-2">
            <i data-lucide="info" id="toastIcon" class="w-5 h-5"></i>
            <span id="toastMsg" class="font-bold tracking-widest text-sm uppercase"></span>
        </div>
    </div>

    <header class="sticky top-0 z-30 bg-slate-600/95 backdrop-blur-md border-b border-white/10 shadow-sm">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-center items-center">
            <h1 class="text-white font-black tracking-[0.3em] text-lg uppercase">YU.ZZZ LIST CLOUD</h1>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-6">
        <div class="flex gap-2 mb-8 items-center">
            <div class="relative flex-[2.5]">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                <input type="text" id="searchInput" placeholder="搜尋..." class="w-full pl-9 pr-3 control-height rounded-xl bg-white border-none shadow-sm outline-none font-bold text-slate-600 text-sm">
            </div>
            <button id="addBtn" class="flex-1 control-height bg-yellow-100 text-yellow-800 rounded-xl font-black shadow-md border-b-4 border-yellow-200 active:scale-95 transition-all text-sm tracking-widest">
                + ADD
            </button>
        </div>

        <div id="emptyState" class="hidden col-span-full text-center py-20">
            <div class="text-slate-200 font-black text-3xl opacity-40 tracking-[0.3em] uppercase">YU.ZZZ</div>
            <p class="text-slate-400 text-[10px] mt-2 font-bold uppercase tracking-widest">No Items Found</p>
        </div>

        <div id="itemsGrid" class="grid grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-8"></div>
    </main>

    <div id="modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-md" id="modalOverlay"></div>
        <div class="bg-white rounded-[2.5rem] w-full max-w-md relative z-10 overflow-hidden shadow-2xl modal-animate">
            <div class="p-6 text-white flex justify-between items-center bg-slate-600">
                <h2 id="modalTitle" class="text-lg font-black tracking-widest uppercase">ADD ITEM</h2>
                <button id="closeModal" class="p-2 hover:bg-white/10 rounded-full transition-all"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <form id="itemForm" class="p-6 space-y-4">
                <input type="hidden" id="editId">
                <input type="text" id="name" required placeholder="商品名稱" class="w-full px-4 py-3 bg-slate-50 rounded-xl border-none font-bold outline-none">
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="customer" placeholder="客戶名" class="w-full px-4 py-3 bg-slate-50 rounded-xl border-none font-bold outline-none">
                    <input type="text" id="tags" placeholder="標籤" class="w-full px-4 py-3 bg-slate-50 rounded-xl border-none font-bold outline-none">
                </div>
                <div class="relative border-2 border-dashed border-slate-100 rounded-2xl py-8 text-center bg-slate-50 cursor-pointer">
                    <img id="previewImg" class="hidden max-h-32 mx-auto rounded-lg mb-2">
                    <div id="uploadText"><i data-lucide="camera" class="mx-auto w-10 h-10 text-slate-200"></i><p class="text-[10px] font-black text-slate-300 uppercase">Upload Photo</p></div>
                    <input type="file" id="imageInput" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*">
                </div>
                <button type="submit" class="w-full py-4 bg-slate-600 text-white font-black rounded-2xl shadow-lg border-b-4 border-slate-700 tracking-widest">SAVE</button>
            </form>
        </div>
    </div>
</body>
</html>
