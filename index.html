<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YU.ZZZ LIST</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F1F5F9; color: #334155; }
        .purchased-overlay { background: rgba(240, 249, 255, 0.7); backdrop-filter: blur(3px); }
        .loader-ring { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal-animate { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="pb-10">

    <header class="sticky top-0 z-30 bg-slate-500/95 backdrop-blur-md border-b border-white/10 shadow-sm">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-white font-black tracking-[0.2em] text-lg uppercase">YU.ZZZ LIST</h1>
            <div id="status" class="text-[10px] text-white/60 font-bold uppercase tracking-widest flex items-center gap-2">
                <div class="loader-ring"></div> Connecting
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-8">
        <div class="flex flex-col md:flex-row gap-4 mb-10">
            <div class="relative flex-1">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                <input type="text" id="searchInput" 
                    class="w-full pl-12 pr-4 py-4 rounded-2xl bg-white border-none shadow-sm focus:ring-4 focus:ring-slate-200 outline-none transition-all font-medium text-slate-600">
            </div>
            <button id="addBtn" class="px-10 py-4 bg-yellow-100 text-yellow-800 rounded-2xl font-black shadow-md border-b-4 border-yellow-200 active:scale-95 transition-all flex items-center justify-center gap-2 uppercase tracking-widest">
                <span class="text-yellow-800 text-xl font-black">+</span> ADD ITEM
            </button>
        </div>

        <div id="itemsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20 text-slate-300 font-bold uppercase tracking-widest animate-pulse text-sm">Initializing...</div>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-md" id="modalOverlay"></div>
        <div class="bg-white rounded-[3rem] w-full max-w-md relative z-10 overflow-hidden shadow-2xl modal-animate border border-white/50">
            <div class="p-8 text-white flex justify-between items-center bg-slate-500">
                <h2 id="modalTitle" class="text-xl font-black tracking-widest uppercase">ADD ITEM</h2>
                <button id="closeModal" class="p-2 hover:bg-white/10 rounded-full transition-all">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <form id="itemForm" class="p-8 space-y-5">
                <input type="hidden" id="editId">
                
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Product Name</label>
                    <input type="text" id="name" required class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none font-bold text-slate-600 focus:ring-4 focus:ring-slate-100 outline-none transition-all">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Customer</label>
                        <input type="text" id="customer" class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none font-bold text-slate-600 focus:ring-4 focus:ring-slate-100 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Tags</label>
                        <input type="text" id="tags" class="w-full px-6 py-4 bg-slate-50 rounded-2xl border-none font-bold text-slate-600 focus:ring-4 focus:ring-slate-100 outline-none transition-all">
                    </div>
                </div>
                
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Reference Image</label>
                    <div class="relative border-2 border-dashed border-slate-100 rounded-3xl py-10 text-center bg-slate-50 hover:bg-slate-100 transition-all cursor-pointer group">
                        <img id="previewImg" class="hidden max-h-32 mx-auto rounded-xl shadow-lg mb-2">
                        <div id="uploadText">
                            <i data-lucide="image" class="mx-auto w-10 h-10 text-slate-200 group-hover:text-slate-300"></i>
                            <p class="text-[10px] mt-2 font-black text-slate-300 uppercase">Click to upload photo</p>
                        </div>
                        <input type="file" id="imageInput" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*">
                    </div>
                </div>
                
                <button type="submit" id="saveBtn" class="w-full py-5 bg-slate-500 text-white font-black rounded-3xl shadow-lg active:scale-95 border-b-4 border-slate-600 transition-all uppercase tracking-widest flex items-center justify-center gap-2">
                    <span class="text-white text-xl font-black">+</span> SAVE
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const config = JSON.parse(__firebase_config);
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'yu-zzz';

        let items = [], base64Img = null;
        let isReady = false;

        const init = async () => {
            const statusEl = document.getElementById('status');
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                isReady = true;
                statusEl.innerHTML = '<span class="text-emerald-400 font-bold tracking-widest">● Cloud Synced</span>';
                
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'products');
                onSnapshot(colRef, (s) => {
                    items = s.docs.map(d => ({ id: d.id, ...d.data() }));
                    items.sort((a,b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0));
                    render();
                });
            } catch (e) {
                statusEl.innerHTML = '<span class="text-red-300 uppercase tracking-widest font-black">Error</span>';
                render();
            }
        };

        function render() {
            const grid = document.getElementById('itemsGrid');
            const q = document.getElementById('searchInput').value.toLowerCase();
            const list = items.filter(i => 
                (i.name||'').toLowerCase().includes(q) || 
                (i.customer||'').toLowerCase().includes(q) ||
                (i.tags || []).some(t => t.toLowerCase().includes(q))
            );

            if (items.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-slate-200 font-black text-4xl opacity-50 tracking-[0.4em] uppercase">YU.ZZZ</div>`;
                return;
            }

            grid.innerHTML = list.map(i => {
                const done = i.status === '已採購';
                // 加大標籤字體與內距
                const tagsHtml = (i.tags || []).map(t => `<span class="bg-slate-100 text-slate-500 px-3 py-1 rounded-lg text-[11px] font-black uppercase tracking-wider shadow-sm">#${t}</span>`).join(' ');
                
                return `
                <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-xl border border-slate-100 flex flex-col relative transition-all">
                    <div class="h-52 bg-slate-50 relative overflow-hidden">
                        ${i.image ? `<img src="${i.image}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-slate-100"><i data-lucide="image" class="w-14 h-14"></i></div>`}
                        ${done ? `
                        <div class="absolute inset-0 purchased-overlay flex items-center justify-center font-black text-slate-600 bg-white/70">
                            <div class="bg-white/80 px-6 py-2 rounded-full shadow-sm text-xs tracking-widest uppercase">已採購</div>
                        </div>` : ''}
                    </div>
                    <div class="p-7 flex-1 flex flex-col">
                        <!-- 商品名稱與標籤放同一行 -->
                        <div class="flex justify-between items-start gap-2 mb-1">
                            <div class="font-black text-slate-700 text-lg line-clamp-1 flex-1">${i.name}</div>
                            <div class="flex flex-wrap justify-end gap-1.5 shrink-0 pt-0.5">
                                ${tagsHtml}
                            </div>
                        </div>
                        <div class="text-[10px] text-slate-400 font-black uppercase tracking-widest">${i.customer || 'Anonymous'}</div>
                        
                        <div class="mt-auto pt-6 flex items-center justify-between gap-2">
                            <div class="flex gap-2 items-center flex-1">
                                <button onclick="window.toggle('${i.id}')" class="flex-1 py-3 rounded-2xl text-[10px] font-black tracking-widest uppercase shadow-sm transition-all ${done ? 'bg-yellow-100 text-yellow-800 border-b-2 border-yellow-200' : 'bg-slate-50 text-slate-400 border border-slate-100'}">
                                    ${done ? '回復待購' : '標記採購'}
                                </button>
                                <button onclick="window.edit('${i.id}')" class="p-3 text-slate-300 hover:text-slate-500 transition-colors"><i data-lucide="edit-3" class="w-4.5 h-4.5"></i></button>
                            </div>
                            
                            <button onclick="window.del('${i.id}')" class="p-3 text-red-200 hover:text-red-400 transition-colors">
                                <i data-lucide="trash-2" class="w-4.5 h-4.5"></i>
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        window.toggle = (id) => {
            if (!isReady) return;
            const i = items.find(x => x.id === id);
            updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id), {
                status: i.status === '已採購' ? '待購' : '已採購',
                updatedAt: new Date().toISOString()
            });
        };

        window.del = (id) => isReady && confirm('Delete item?') && deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id));

        window.edit = (id) => {
            const i = items.find(x => x.id === id);
            document.getElementById('editId').value = i.id;
            document.getElementById('name').value = i.name;
            document.getElementById('customer').value = i.customer || '';
            document.getElementById('tags').value = (i.tags || []).join(',');
            base64Img = i.image;
            if(base64Img) {
                document.getElementById('previewImg').src = base64Img;
                document.getElementById('previewImg').classList.remove('hidden');
                document.getElementById('uploadText').classList.add('hidden');
            }
            document.getElementById('modalTitle').innerText = 'EDIT ITEM';
            document.getElementById('saveBtn').innerHTML = '<span class="text-white text-xl font-black">+</span> UPDATE';
            document.getElementById('modal').classList.remove('hidden');
        };

        document.getElementById('itemForm').onsubmit = async (e) => {
            e.preventDefault();
            if (!isReady) return;
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            const originalHTML = btn.innerHTML;
            btn.innerText = 'SAVING...';

            const id = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('name').value,
                customer: document.getElementById('customer').value,
                tags: document.getElementById('tags').value.split(',').map(t => t.trim()).filter(t => t),
                image: base64Img,
                updatedAt: new Date().toISOString()
            };
            
            try {
                if(id) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id), data);
                else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), {...data, status:'待購', createdAt: new Date().toISOString()});
                close();
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        };

        document.getElementById('imageInput').onchange = (e) => {
            const f = e.target.files[0];
            if (!f) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const w = 400; canvas.width = w; canvas.height = img.height * (w/img.width);
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    base64Img = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('previewImg').src = base64Img;
                    document.getElementById('previewImg').classList.remove('hidden');
                    document.getElementById('uploadText').classList.add('hidden');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(f);
        };

        const close = () => {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('itemForm').reset();
            base64Img = null;
            document.getElementById('previewImg').classList.add('hidden');
            document.getElementById('uploadText').classList.remove('hidden');
        };

        document.getElementById('addBtn').onclick = () => { 
            document.getElementById('editId').value = ''; 
            document.getElementById('modalTitle').innerText = 'ADD ITEM'; 
            document.getElementById('saveBtn').innerHTML = '<span class="text-white text-xl font-black">+</span> SAVE';
            document.getElementById('modal').classList.remove('hidden'); 
        };
        document.getElementById('closeModal').onclick = close;
        document.getElementById('modalOverlay').onclick = close;
        document.getElementById('searchInput').oninput = render;

        init();
    </script>
</body>
</html>
