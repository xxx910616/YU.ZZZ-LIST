<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YU.ZZZ LIST</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F1F5F9; color: #334155; -webkit-tap-highlight-color: transparent; }
        .purchased-overlay { background: rgba(224, 242, 254, 0.9); backdrop-filter: blur(2px); }
        .modal-animate { animation: slideUp 0.2s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        input { -webkit-appearance: none; border-radius: 1rem; }
        /* 手機版圖片高度調整 */
        .img-container { height: 140px; display: flex; align-items: center; justify-content: center; background: #f8fafc; }
        @media (min-width: 640px) { .img-container { height: 224px; } }
        .control-height { height: 52px; }
    </style>
</head>
<body class="pb-10">

    <header class="sticky top-0 z-30 bg-slate-600/95 backdrop-blur-md border-b border-white/10 shadow-sm">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-center items-center">
            <h1 class="text-white font-black tracking-[0.3em] text-lg sm:text-xl uppercase">YU.ZZZ LIST</h1>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-6">
        <!-- 搜尋與按鈕平行排版 -->
        <div class="flex flex-row gap-2 sm:gap-3 mb-8 items-center">
            <div class="relative flex-[2.5]">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                <input type="text" id="searchInput" placeholder="SEARCH..."
                    class="w-full pl-9 pr-3 control-height rounded-xl sm:rounded-2xl bg-white border-none shadow-sm focus:ring-4 focus:ring-slate-200 outline-none transition-all font-bold text-slate-600 text-xs sm:text-sm">
            </div>
            <button id="addBtn" class="flex-1 control-height bg-yellow-100 text-yellow-800 rounded-xl sm:rounded-2xl font-black shadow-md border-b-4 border-yellow-200 active:scale-[0.98] transition-all flex items-center justify-center gap-1 sm:gap-2 uppercase tracking-widest text-[10px] sm:text-sm whitespace-nowrap px-2">
                <span class="text-yellow-800 text-base sm:text-lg font-black">+</span> ADD
            </button>
        </div>

        <!-- 商品列表：手機版 grid-cols-2 -->
        <div id="itemsGrid" class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-8">
            <!-- 資料顯示區 -->
        </div>
    </main>

    <!-- Modal (內容保持不變) -->
    <div id="modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-md" id="modalOverlay"></div>
        <div class="bg-white rounded-[2.5rem] w-full max-w-md relative z-10 overflow-hidden shadow-2xl modal-animate">
            <div class="p-6 text-white flex justify-between items-center bg-slate-600">
                <h2 id="modalTitle" class="text-lg font-black tracking-widest uppercase">ADD ITEM</h2>
                <button id="closeModal" class="p-2 hover:bg-white/10 rounded-full transition-all">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <form id="itemForm" class="p-6 space-y-4">
                <input type="hidden" id="editId">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 ml-1">Name</label>
                    <input type="text" id="name" required class="w-full px-4 py-3 bg-slate-50 rounded-xl border-none font-bold text-slate-600 focus:ring-4 focus:ring-slate-100 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 ml-1">Customer</label>
                        <input type="text" id="customer" class="w-full px-4 py-3 bg-slate-50 rounded-xl border-none font-bold text-slate-600 focus:ring-4 focus:ring-slate-100 outline-none">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 ml-1">Tags</label>
                        <input type="text" id="tags" class="w-full px-4 py-3 bg-slate-50 rounded-xl border-none font-bold text-slate-600 focus:ring-4 focus:ring-slate-100 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 ml-1">Photo</label>
                    <div class="relative border-2 border-dashed border-slate-100 rounded-2xl py-6 text-center bg-slate-50 hover:bg-slate-100 transition-all cursor-pointer">
                        <img id="previewImg" class="hidden max-h-24 mx-auto rounded-lg shadow-md mb-2">
                        <div id="uploadText">
                            <i data-lucide="camera" class="mx-auto w-8 h-8 text-slate-200"></i>
                            <p class="text-[10px] mt-1 font-black text-slate-300 uppercase">Upload</p>
                        </div>
                        <input type="file" id="imageInput" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*">
                    </div>
                </div>
                <button type="submit" id="saveBtn" class="w-full py-4 bg-slate-600 text-white font-black rounded-2xl shadow-lg active:scale-95 border-b-4 border-slate-700 transition-all uppercase tracking-widest flex items-center justify-center gap-2">
                    SAVE
                </button>
            </form>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'yu_zzz_local_data';
        let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        let base64Img = null;

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
            render();
        }

        function render() {
            const grid = document.getElementById('itemsGrid');
            const q = document.getElementById('searchInput').value.toLowerCase();
            
            const list = items.filter(i => 
                (i.name||'').toLowerCase().includes(q) || 
                (i.customer||'').toLowerCase().includes(q) ||
                (i.tags || []).some(t => t.toLowerCase().includes(q))
            );

            list.sort((a, b) => {
                if (a.status === b.status) return new Date(b.updatedAt) - new Date(a.updatedAt);
                return a.status === '已採購' ? 1 : -1;
            });

            if (items.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-slate-200 font-black text-3xl opacity-40 tracking-[0.3em] uppercase">YU.ZZZ</div>`;
                return;
            }

            grid.innerHTML = list.map(i => {
                const done = i.status === '已採購';
                return `
                <div class="bg-white rounded-[1.5rem] sm:rounded-[2.5rem] overflow-hidden shadow-sm border border-slate-100 flex flex-col relative transition-all active:scale-[0.98]">
                    <div class="img-container relative overflow-hidden">
                        ${i.image ? `<img src="${i.image}" class="w-full h-full object-cover">` : `<i data-lucide="image" class="w-8 h-8 sm:w-14 sm:h-14 text-slate-100"></i>`}
                        ${done ? `<div class="absolute inset-0 purchased-overlay flex items-center justify-center"><div class="bg-white/90 border border-sky-200 px-3 py-1 sm:px-6 sm:py-2 rounded-full shadow-md text-[8px] sm:text-xs tracking-widest uppercase text-sky-700 font-black">DONE</div></div>` : ''}
                    </div>
                    <div class="p-3 sm:p-8 flex-1 flex flex-col">
                        <div class="mb-1">
                            <div class="font-black text-slate-700 text-sm sm:text-xl line-clamp-1 leading-tight">${i.name}</div>
                            <div class="text-[9px] sm:text-[11px] text-slate-400 font-black uppercase tracking-wider mt-0.5">${i.customer || '匿名'}</div>
                        </div>
                        <div class="mt-auto pt-3 sm:pt-6 flex flex-col sm:flex-row items-stretch sm:items-center gap-2 border-t border-slate-50">
                            <button onclick="toggleStatus('${i.id}')" class="flex-1 py-2 sm:py-4 rounded-lg sm:rounded-2xl text-[8px] sm:text-[10px] font-black tracking-widest uppercase shadow-sm ${done ? 'bg-yellow-100 text-yellow-800' : 'bg-slate-50 text-slate-400'}">
                                ${done ? 'REVERT' : 'DONE'}
                            </button>
                            <div class="flex justify-center gap-1">
                                <button onclick="editItem('${i.id}')" class="p-2 text-slate-300"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                <button onclick="deleteItem('${i.id}')" class="p-2 text-red-100"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        window.toggleStatus = (id) => {
            const idx = items.findIndex(x => x.id === id);
            items[idx].status = items[idx].status === '已採購' ? '待購' : '已採購';
            items[idx].updatedAt = new Date().toISOString();
            saveData();
        };

        window.deleteItem = (id) => {
            if(confirm('確定刪除？')) {
                items = items.filter(x => x.id !== id);
                saveData();
            }
        };

        window.editItem = (id) => {
            const i = items.find(x => x.id === id);
            document.getElementById('editId').value = i.id;
            document.getElementById('name').value = i.name;
            document.getElementById('customer').value = i.customer || '';
            document.getElementById('tags').value = (i.tags || []).join(',');
            base64Img = i.image;
            if(base64Img) {
                document.getElementById('previewImg').src = base64Img;
                document.getElementById('previewImg').classList.remove('hidden');
                document.getElementById('uploadText').classList.add('hidden');
            }
            document.getElementById('modalTitle').innerText = 'EDIT ITEM';
            document.getElementById('modal').classList.remove('hidden');
        };

        document.getElementById('itemForm').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('name').value,
                customer: document.getElementById('customer').value,
                tags: document.getElementById('tags').value.split(',').map(t => t.trim()).filter(t => t),
                image: base64Img,
                updatedAt: new Date().toISOString()
            };

            if(id) {
                const idx = items.findIndex(x => x.id === id);
                items[idx] = { ...items[idx], ...data };
            } else {
                items.push({
                    ...data,
                    id: Date.now().toString(),
                    status: '待購',
                    createdAt: new Date().toISOString()
                });
            }
            closeModal();
            saveData();
        };

        document.getElementById('imageInput').onchange = (e) => {
            const f = e.target.files[0];
            if (!f) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const w = 400; canvas.width = w; canvas.height = img.height * (w/img.width);
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    base64Img = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('previewImg').src = base64Img;
                    document.getElementById('previewImg').classList.remove('hidden');
                    document.getElementById('uploadText').classList.add('hidden');
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(f);
        };

        const closeModal = () => {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('itemForm').reset();
            base64Img = null;
            document.getElementById('previewImg').classList.add('hidden');
            document.getElementById('uploadText').classList.remove('hidden');
        };

        document.getElementById('addBtn').onclick = () => { 
            document.getElementById('editId').value = ''; 
            document.getElementById('modalTitle').innerText = 'ADD ITEM'; 
            document.getElementById('modal').classList.remove('hidden'); 
        };
        document.getElementById('closeModal').onclick = closeModal;
        document.getElementById('modalOverlay').onclick = closeModal;
        document.getElementById('searchInput').oninput = render;

        window.onload = () => {
            render();
            lucide.createIcons();
        };
    </script>
</body>
</html>
